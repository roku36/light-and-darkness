name: Desktop Build

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  macos:
    name: macOS .app
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Build .app
        run: npm run desktop:build:mac

      - name: Verify .app signature
        run: |
          codesign --verify --deep --strict --verbose=2 "src-tauri/target/release/bundle/macos/Light and Darkness Treasure.app"

      - name: Archive .app
        run: ditto -c -k --sequesterRsrc --keepParent "src-tauri/target/release/bundle/macos/Light and Darkness Treasure.app" "light-and-darkness-macos-app.zip"

      - uses: actions/upload-artifact@v4
        with:
          name: macos-app
          path: light-and-darkness-macos-app.zip

      - name: Upload .app to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          overwrite_files: true
          files: light-and-darkness-macos-app.zip

  windows:
    name: Windows .exe
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Build installer .exe
        run: npm run desktop:build:windows

      - name: Normalize Windows artifact names
        shell: pwsh
        run: |
          Copy-Item "src-tauri/target/release/light-and-darkness.exe" "light-and-darkness.exe"
          $installer = Get-ChildItem "src-tauri/target/release/bundle/nsis/*-setup.exe" | Select-Object -First 1
          Copy-Item $installer.FullName "light-and-darkness-setup.exe"

      - uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: |
            light-and-darkness.exe
            light-and-darkness-setup.exe

      - name: Upload .exe to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          overwrite_files: true
          files: |
            light-and-darkness.exe
            light-and-darkness-setup.exe
